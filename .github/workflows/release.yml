# SPDX-License-Identifier: GPL-3.0-or-later
# Release workflow — triggered by a version tag (e.g. v0.1.0).
#
# Builds static release binaries for three targets:
#   Linux   x86_64-unknown-linux-musl   (fully static via musl libc)
#   macOS   aarch64-apple-darwin        (GitHub macos-latest is Apple Silicon)
#   Windows x86_64-pc-windows-msvc
#
# On success, creates a GitHub Release and uploads the binaries as assets.
# The release is created as a draft so the author can edit the notes before
# publishing.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: ""

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — fully static musl binary.
          - target:  x86_64-unknown-linux-musl
            runner:  ubuntu-latest
            binary:  gitssh
            archive: gitssh-${{ github.ref_name }}-linux-x86_64.tar.gz

          # macOS — Apple Silicon (arm64).
          - target:  aarch64-apple-darwin
            runner:  macos-latest
            binary:  gitssh
            archive: gitssh-${{ github.ref_name }}-macos-arm64.tar.gz

          # Windows — MSVC toolchain.
          - target:  x86_64-pc-windows-msvc
            runner:  windows-latest
            binary:  gitssh.exe
            archive: gitssh-${{ github.ref_name }}-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # musl cross-compilation toolchain (Linux only).
      - name: Install musl tools (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y musl-tools

      # ring requires nasm on Windows.
      - name: Install nasm (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p gitssh

      # ── Package ─────────────────────────────────────────────────────────────

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} .
          tar -czf ${{ matrix.archive }} ${{ matrix.binary }} README.md LICENSE

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" .
          Compress-Archive -Path ${{ matrix.binary }},README.md,LICENSE `
                           -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
