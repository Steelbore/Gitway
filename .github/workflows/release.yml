# SPDX-License-Identifier: GPL-3.0-or-later
# Release workflow — triggered by a version tag (e.g. v0.2.0).
#
# Builds release artifacts for multiple targets and formats:
#
#   Binary archives  (build job)
#     Linux   x86_64-unknown-linux-musl   (fully static via musl libc)  → .tar.gz
#     macOS   aarch64-apple-darwin        (GitHub macos-latest = Apple Silicon) → .tar.gz
#     Windows x86_64-pc-windows-msvc                                     → .zip
#
#   Debian package  (deb job)
#     x86_64 .deb via cargo-deb
#
#   RPM package  (rpm job)
#     x86_64 .rpm via cargo-generate-rpm
#
#   GitHub Release  (release job)
#     Draft release with all artifacts; author edits notes before publishing.
#
#   crates.io publish  (publish job)
#     Publishes gitway-lib then gitway after the release is created.
#     Requires the CARGO_REGISTRY_TOKEN secret.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: ""

jobs:
  # ── Binary archives ─────────────────────────────────────────────────────────
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — fully static musl binary.
          - target:   x86_64-unknown-linux-musl
            runner:   ubuntu-latest
            binary:   gitway
            binary2:  gitway-keygen
            binary3:  gitway-add
            archive:  gitway-${{ github.ref_name }}-linux-x86_64.tar.gz

          # macOS — Apple Silicon (arm64).
          - target:   aarch64-apple-darwin
            runner:   macos-latest
            binary:   gitway
            binary2:  gitway-keygen
            binary3:  gitway-add
            archive:  gitway-${{ github.ref_name }}-macos-arm64.tar.gz

          # Windows — MSVC toolchain. `gitway-add` is Unix-only (Phase 2
          # agent client speaks only over Unix domain sockets; named-pipe
          # support is Phase 3), so `binary3` is deliberately empty here
          # and the Package step skips it on Windows.
          - target:   x86_64-pc-windows-msvc
            runner:   windows-latest
            binary:   gitway.exe
            binary2:  gitway-keygen.exe
            binary3:  ""
            archive:  gitway-${{ github.ref_name }}-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Defensive: some matrix.target values are not added automatically by
      # the toolchain action when the host and target differ (notably
      # x86_64-unknown-linux-musl on a gnu host). Call `rustup target add`
      # explicitly so cargo has the standard library for the target.
      - name: Ensure target is installed
        shell: bash
        run: rustup target add ${{ matrix.target }}

      # musl cross-compilation toolchain (Linux only).
      - name: Install musl tools (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y musl-tools

      # aws-lc-rs requires nasm on Windows for assembly code generation.
      - name: Install nasm (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      # `-p gitway` builds both [[bin]] targets in gitway-cli (gitway and
      # gitway-keygen) in one cargo invocation since they share codegen.
      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p gitway

      # ── Package ─────────────────────────────────────────────────────────────

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }}  .
          cp target/${{ matrix.target }}/release/${{ matrix.binary2 }} .
          cp target/${{ matrix.target }}/release/${{ matrix.binary3 }} .
          tar -czf ${{ matrix.archive }} \
            ${{ matrix.binary }} ${{ matrix.binary2 }} ${{ matrix.binary3 }} \
            README.md LICENSE

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}"  .
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary2 }}" .
          Compress-Archive `
            -Path ${{ matrix.binary }},${{ matrix.binary2 }},README.md,LICENSE `
            -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  # ── Debian package (.deb) ───────────────────────────────────────────────────
  deb:
    name: build .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ubuntu-cargo-deb-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-deb-

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build release binary (required by cargo-deb)
        run: cargo build --release -p gitway

      - name: Build .deb package
        run: cargo deb -p gitway --no-build

      - name: Locate .deb
        id: deb
        run: echo "path=$(ls target/debian/*.deb)" >> "$GITHUB_OUTPUT"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitway-${{ github.ref_name }}-linux-x86_64.deb
          path: ${{ steps.deb.outputs.path }}

  # ── RPM package (.rpm) ──────────────────────────────────────────────────────
  rpm:
    name: build .rpm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ubuntu-cargo-rpm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-rpm-

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked

      - name: Build release binary (required by cargo-generate-rpm)
        run: cargo build --release -p gitway

      - name: Build .rpm package
        run: cargo generate-rpm -p gitway-cli

      - name: Locate .rpm
        id: rpm
        run: echo "path=$(ls target/generate-rpm/*.rpm)" >> "$GITHUB_OUTPUT"

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitway-${{ github.ref_name }}-linux-x86_64.rpm
          path: ${{ steps.rpm.outputs.path }}

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: create release
    needs: [build, deb, rpm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      # Expose the release URL so the publish job can link to it.
      release_url: ${{ steps.create.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*

  # ── Publish to crates.io ────────────────────────────────────────────────────
  # Runs after the GitHub Release is created so the release exists as a
  # reference point.  Requires the CARGO_REGISTRY_TOKEN repository secret.
  publish:
    name: publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ubuntu-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-publish-

      # Publish the library first — the CLI depends on it.
      - name: Publish gitway-lib
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p gitway-lib

      # crates.io needs a moment after the library publish before the CLI
      # can resolve it as a dependency (index propagation delay).
      - name: Wait for index propagation
        run: sleep 30

      - name: Publish gitway
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p gitway
