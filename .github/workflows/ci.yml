# SPDX-License-Identifier: GPL-3.0-or-later
# CI matrix — build, lint, and test Gitway on stable + MSRV Rust.
#
# Jobs:
#   check   — cargo check (fast fail on type errors), Linux only
#   lint    — cargo clippy -D warnings + rustfmt --check, Linux only
#   test    — cargo test (unit + doc tests) on Linux, macOS, and Windows
#   msrv    — cargo check on rust-version from Cargo.toml (currently 1.85)
#
# Integration tests (test_connection, test_clone) require GITWAY_INTEGRATION_TESTS=1
# and a live SSH identity.  They are not run in CI to avoid flaky failures.

name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Fast type-check (Linux) ─────────────────────────────────────────────────
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-check-

      - name: cargo check
        run: cargo check --all-targets

  # ── Lint (Linux) ────────────────────────────────────────────────────────────
  lint:
    name: clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable with clippy + rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Defensive: some `dtolnay/rust-toolchain` behaviour has inconsistently
      # installed the `components:` inputs, leading to
      # `cargo-clippy is not installed for the toolchain '...'` at run time.
      # Explicitly add the components we need so the next step is guaranteed
      # to find them.
      - name: Ensure clippy + rustfmt are installed
        shell: bash
        run: rustup component add clippy rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo fmt check
        run: cargo fmt --all --check

  # ── Unit + doc tests (Linux, macOS, Windows) ────────────────────────────────
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # ring requires nasm on Windows.
      - name: Install nasm (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: cargo test
        # Integration tests are gated behind GITWAY_INTEGRATION_TESTS and are
        # not set here, so only unit and doc tests run in CI.
        run: cargo test

  # ── Release binary size guard (Linux) ─────────────────────────────────────
  #
  # S2: the stripped release binary must stay under 10 MB.
  # Fails fast if a dependency change bloats the binary unexpectedly.
  size-check:
    name: binary size ≤ 10 MB (S2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-size-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-size-

      - name: Build release binary
        run: cargo build --release -p gitway

      - name: Check binary size
        run: |
          SIZE=$(stat -c%s target/release/gitway)
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "Release binary: ${SIZE_MB} MB  (S2 limit: 10 MB)"
          if [ "$SIZE" -gt 10485760 ]; then
            echo "Binary exceeds 10 MB limit (S2)"
            exit 1
          fi

  # ── Nix flake check (Linux) ────────────────────────────────────────────────
  #
  # Guards against the flake drifting from the workspace Cargo.toml (stale
  # version, wrong build flags, broken meta).  Runs `nix flake check` + a
  # full `nix build .#default` so any NixOS user following the README's
  # `nix profile install github:steelbore/gitway` recipe gets a working
  # binary at the current version.
  nix-flake:
    name: nix flake check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: nix flake check
        run: nix flake check --all-systems

      - name: nix build .#default
        run: nix build .#default --print-build-logs

      - name: Verify all three binaries are installed
        run: |
          test -x result/bin/gitway
          test -x result/bin/gitway-keygen
          test -x result/bin/gitway-add
          ./result/bin/gitway --version

  # ── MSRV check (Linux) ──────────────────────────────────────────────────────
  msrv:
    name: cargo check (MSRV 1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust 1.85 (MSRV)
        uses: dtolnay/rust-toolchain@1.85

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-msrv-

      - name: cargo check (MSRV)
        run: cargo check --all-targets
