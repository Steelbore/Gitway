# Workspace-level Cargo configuration.

# ── Compiler flags ────────────────────────────────────────────────────────────
# Sets -C target-cpu=native for all rustc invocations when RUSTFLAGS is not
# exported in the shell environment.
#
# WARNING: the NixOS shell exports RUSTFLAGS="-C target-cpu=x86-64-v4" which
# requires AVX-512 and causes SIGILL on CPUs that lack it (e.g. i7-8665U).
# Always build via `just build` (or `unset RUSTFLAGS && cargo build`) so this
# config value is used instead of the system default.
[build]
rustflags = ["-C", "target-cpu=native"]

# ── C compiler flags ──────────────────────────────────────────────────────────
# NixOS stdenv injects `-flto=auto` globally, which can produce GCC LTO IR
# objects that the link step cannot resolve. Historically we forced CFLAGS
# here via `[env]` with `force = true`, but that value (`-march=native -O2
# -pipe`) is x86-GCC-only and silently breaks aarch64-apple-darwin (invalid
# `-march=native`) and x86_64-pc-windows-msvc (cl.exe rejects GCC flags and
# the aws-lc-sys MSVC path needs its own compile environment).
#
# The NixOS-specific workaround now lives in shell.nix (which sets CFLAGS on
# the shell environment instead of on all cargo invocations), so non-Nix
# builds — including GitHub Actions runners — use their native toolchain
# defaults.  Do NOT add `[env] CFLAGS = ...` here again.
