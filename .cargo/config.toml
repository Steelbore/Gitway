# Workspace-level Cargo configuration.

# ── Compiler flags ────────────────────────────────────────────────────────────
# Sets -C target-cpu=native for all rustc invocations when RUSTFLAGS is not
# exported in the shell environment.
#
# WARNING: the NixOS shell exports RUSTFLAGS="-C target-cpu=x86-64-v4" which
# requires AVX-512 and causes SIGILL on CPUs that lack it (e.g. i7-8665U).
# Always build via `just build` (or `unset RUSTFLAGS && cargo build`) so this
# config value is used instead of the system default.
[build]
rustflags = ["-C", "target-cpu=native"]

# ── C compiler flags ──────────────────────────────────────────────────────────
# Override the system CFLAGS to strip -flto=auto.
# NixOS sets -flto=auto globally; ring's cc-rs build produces GCC LTO IR
# objects that the linker cannot resolve (no LTO plugin in Cargo's link step).
[env]
CFLAGS = { value = "-march=native -O2 -pipe", force = true }
