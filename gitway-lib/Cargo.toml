# SPDX-License-Identifier: GPL-3.0-or-later
[package]
name          = "gitway-lib"
description   = "Core SSH transport library for Git hosting services (GitHub, GitLab, Codeberg, and self-hosted)."
keywords      = ["ssh", "git", "gitlab", "codeberg", "transport"]
categories    = ["network-programming", "authentication"]
readme        = "README.md"
documentation = "https://docs.rs/gitway-lib"

version.workspace      = true
edition.workspace      = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
russh.workspace    = true
tokio.workspace    = true
thiserror.workspace = true
log.workspace      = true
dirs.workspace     = true
zeroize.workspace  = true

# SSH key format + SSHSIG signing (phase 1: keygen, sign, verify).
ssh-key.workspace   = true
sha2.workspace      = true
rand_core.workspace = true

# SSH agent wire-protocol client (phase 2: `gitway agent`, `gitway-add`).
# Only the blocking API is pulled in; Unix-only for now (Windows named-pipe
# support is Phase 3 scope).
[target.'cfg(unix)'.dependencies]
ssh-agent-lib.workspace = true

[dev-dependencies]
tokio     = { workspace = true }
tempfile  = { workspace = true }
criterion = { version = "0.5", features = ["async_tokio"] }

[[bench]]
name    = "throughput"
harness = false
